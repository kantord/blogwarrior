{% for post in lines %}
<a class="post" href="/read.html?url={{ post.link }}&title={{ post.title }}">
  <div class="post-title">{{ post.title }}</div>
  <div class="post-meta">{{ post.feed_title }}{% if post.date %} &middot; {{ post.date }}{% endif %}</div>
</a>
{% endfor %}
{% if not lines %}
<p class="empty">no posts found</p>
{% endif %}
