<!DOCTYPE html>
<html>
<head>
    <title>blogtato</title>
    <meta charset="utf-8">
    <script src="/htmx.min.js"></script>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <h1>blogtato</h1>
        <button id="sync-btn" hx-post="/_api/render/sync.sh" hx-target="#posts" hx-disabled-elt="this"
                hx-on::before-request="this.textContent='syncing...'"
                hx-on::after-request="this.textContent='sync'">sync</button>
    </header>
    <main id="posts" hx-post="/_api/render/show.sh" hx-trigger="load" hx-target="this">
        loading...
    </main>
</body>
</html>
