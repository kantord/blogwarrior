<!DOCTYPE html>
<html>
<head>
    <title>blogtato</title>
    <script src="/htmx.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --shell-from: #1a1025;
            --shell-to: #0f1a2e;
            --surface: #24243e;
            --card: #2c2c4a;
            --card-hover: #343458;
            --border: rgba(255,255,255,0.08);
            --text: #e0e0e0;
            --text-dim: #888;
            --accent: #7c8cf8;
            --radius: 8px;
            --radius-lg: 14px;
            --shell-pad: 0.75rem;
        }
        body { font-family: system-ui, sans-serif; background: linear-gradient(135deg, var(--shell-from), var(--shell-to)); color: var(--text); height: 100vh; display: flex; flex-direction: column; padding: var(--shell-pad); gap: 0.4rem; }
        #app { flex: 1; min-height: 0; display: flex; flex-direction: column; gap: 0.4rem; }
        .toolbar { display: flex; align-items: center; padding: 0.2rem 0.25rem; gap: 0.5rem; flex-shrink: 0; }
        .toolbar .title { flex: 1; font-size: 1rem; font-weight: 700; opacity: 0.7; }
        .btn { background: var(--card); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.35rem 0.9rem; font-size: 0.8rem; cursor: pointer; transition: background 0.15s; }
        .btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-ghost { background: transparent; border-color: transparent; }
        .btn-ghost:hover { background: var(--card); color: var(--text); border-color: transparent; }
        .window { flex: 1; min-height: 0; background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); overflow-y: auto; padding: 0.5rem; }
        .window-frame { flex: 1; min-height: 0; background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); overflow: hidden; display: flex; }
        .window-frame iframe { flex: 1; width: 100%; border: 0; }
        .card { background: var(--card); border-radius: var(--radius); padding: 0.7rem 0.9rem; margin-bottom: 0.3rem; cursor: pointer; transition: background 0.15s; }
        .card:hover { background: var(--card-hover); }
        .card-title { font-weight: 500; font-size: 0.95rem; }
        .card-meta { font-size: 0.8rem; color: var(--text-dim); margin-top: 0.15rem; }
        .view-bar { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; padding: 0.2rem 0.25rem; }
        .view-bar-text { min-width: 0; }
        .view-title { font-size: 0.9rem; font-weight: 600; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .empty { text-align: center; color: var(--text-dim); padding: 2rem; }
        .spinner { display: inline-block; width: 1.5rem; height: 1.5rem; border: 2px solid var(--text-dim); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; margin: 2rem auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading .btn-label { visibility: hidden; }
        .loading::after { content: ''; display: inline-block; width: 0.8rem; height: 0.8rem; border: 2px solid var(--text-dim); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; position: absolute; }
        .loading { position: relative; display: inline-flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div id="app" hx-post="/_api/render/show.sh" hx-trigger="load" hx-target="this">
        <div class="toolbar"><div class="title">blogtato</div></div>
        <div class="window" style="display:flex;justify-content:center"><div class="spinner"></div></div>
    </div>
</body>
</html>
